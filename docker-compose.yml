# docker-compose.yml - Agile SDR Agent

services:
  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_USER: agile
      POSTGRES_PASSWORD: agile123
      POSTGRES_DB: agile_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agile"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # ========== MongoDB (para Agenda) ==========
  mongodb:
    image: mongo:6.0
    container_name: agent-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: agile
      MONGO_INITDB_ROOT_PASSWORD: agile123
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # ========== Redis (para Cache/Queue) ==========
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # ========== Agent App (apenas config, não start automático) ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdr-agent
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agile:agile123@postgres:5432/agile_agent
      MONGODB_URL: mongodb://agile:agile123@mongodb:27017/agile-agenda?authSource=admin
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-network
    profiles:
      - manual

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
