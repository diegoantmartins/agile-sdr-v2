server {
    if ($host = sdrconfig.sentiia.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sdrconfig.sentiia.com.br;

    # Redirecionamento para HTTPS
    return 301 https://$host$request_uri;


}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sdrconfig.sentiia.com.br;

    # --- Portal Console Web (Frontend) ---
    location / {
        root /var/www/sdrconfig;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # --- API Backend ---
    location /api {
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Headers de Segurança
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Real-IP $remote_addr;
        add_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Forwarded-Proto $scheme;
    }

    # --- Logs e Monitoramento (Acesso Seguro) ---
    location /api/admin/logs {
        proxy_pass http://localhost:3030/api/admin/logs;
        proxy_set_header x-admin-token $http_x_admin_token;
        proxy_set_header Host $host;
    }

    # --- Saúde do Sistema ---
    location /health {
        proxy_pass http://localhost:3030/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Endpoints de Teste (Simulador/Agente) ---
    location /test {
        proxy_pass http://localhost:3030/test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    ssl_certificate /etc/letsencrypt/live/sdrconfig.sentiia.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sdrconfig.sentiia.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
